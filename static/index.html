<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analyse morphologique — IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f12;
      --surface: #1a1a20;
      --surface2: #24242c;
      --accent: #c9a86c;
      --accent-dim: #a68b52;
      --text: #e8e6e3;
      --text-muted: #9a958c;
      --success: #6b9b6e;
      --error: #c75c5c;
      --radius: 14px;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.02em;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1rem;
      font-weight: 300;
      margin-top: 0.5rem;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 2rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .upload-zone {
      border: 2px dashed rgba(201, 168, 108, 0.4);
      border-radius: var(--radius);
      padding: 2.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: rgba(201, 168, 108, 0.04);
    }

    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent);
      background: rgba(201, 168, 108, 0.08);
    }

    .upload-zone input[type="file"] {
      display: none;
    }

    .upload-zone .icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
      opacity: 0.9;
    }

    .upload-zone p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .upload-zone strong {
      color: var(--accent);
    }

    .preview-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1.25rem;
    }

    .preview-item {
      position: relative;
      width: 100px;
      height: 100px;
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface2);
    }

    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .preview-item .remove {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--error);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.9;
    }

    .preview-item .remove:hover {
      opacity: 1;
    }

    .actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }

    .btn {
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      padding: 0.85rem 1.75rem;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-dim));
      color: var(--bg);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(201, 168, 108, 0.35);
    }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .btn-secondary:hover:not(:disabled) {
      background: #2e2e38;
    }

    .loader {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .report-card {
      display: none;
    }

    .report-card.visible {
      display: block;
    }

    .report-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .report-content {
      background: var(--surface2);
      border-radius: 10px;
      padding: 1.5rem;
      white-space: pre-wrap;
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--text);
      max-height: 70vh;
      overflow-y: auto;
    }

    .report-meta {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }

    .message {
      padding: 1rem;
      border-radius: 10px;
      margin-top: 1rem;
    }

    .message.error {
      background: rgba(199, 92, 92, 0.15);
      color: #e8a0a0;
      border: 1px solid rgba(199, 92, 92, 0.3);
    }

    .message.success {
      background: rgba(107, 155, 110, 0.15);
      color: #a8d4ab;
      border: 1px solid rgba(107, 155, 110, 0.3);
    }

    footer {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Analyse morphologique</h1>
      <p class="subtitle">Téléversez une ou plusieurs photos — l’IA rédige un rapport complet</p>
    </header>

    <div class="card">
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="image/*" multiple>
        <div class="icon">📷</div>
        <p><strong>Cliquez ou glissez-déposez</strong> une ou plusieurs photos</p>
        <p style="margin-top: 0.25rem;">JPG, PNG — max 50 Mo par fichier</p>
      </div>
      <div class="preview-list" id="previewList"></div>
      <div class="actions">
        <button type="button" class="btn btn-primary" id="btnAnalyze" disabled>
          Lancer l’analyse
        </button>
        <button type="button" class="btn btn-secondary" id="btnClear">
          Tout effacer
        </button>
      </div>
      <div id="message"></div>
    </div>

    <div class="card report-card" id="reportCard">
      <h2>Rapport d’analyse</h2>
      <p class="report-meta" id="reportMeta"></p>
      <div class="report-content" id="reportContent"></div>
      <div class="actions" style="margin-top: 1rem;">
        <button type="button" class="btn btn-primary" id="btnExport">
          Télécharger le rapport (HTML)
        </button>
      </div>
    </div>
  </div>

  <footer>
    Programme d’analyse morphologique par IA — Rapport confidentiel
  </footer>

  <script>
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const previewList = document.getElementById('previewList');
    const btnAnalyze = document.getElementById('btnAnalyze');
    const btnClear = document.getElementById('btnClear');
    const messageEl = document.getElementById('message');
    const reportCard = document.getElementById('reportCard');
    const reportMeta = document.getElementById('reportMeta');
    const reportContent = document.getElementById('reportContent');
    const btnExport = document.getElementById('btnExport');

    let selectedFiles = [];

    function showMessage(text, type) {
      messageEl.innerHTML = `<div class="message ${type}">${text}</div>`;
      messageEl.style.display = 'block';
    }

    function clearMessage() {
      messageEl.innerHTML = '';
      messageEl.style.display = 'none';
    }

    function updatePreview() {
      previewList.innerHTML = '';
      selectedFiles.forEach((file, i) => {
        const url = URL.createObjectURL(file);
        const div = document.createElement('div');
        div.className = 'preview-item';
        div.innerHTML = `
          <img src="${url}" alt="Preview">
          <button type="button" class="remove" data-idx="${i}" aria-label="Retirer">×</button>
        `;
        div.querySelector('.remove').onclick = () => removeFile(i);
        previewList.appendChild(div);
      });
      btnAnalyze.disabled = selectedFiles.length === 0;
    }

    function removeFile(idx) {
      selectedFiles.splice(idx, 1);
      updatePreview();
    }

    function addFiles(files) {
      const allowed = Array.from(files).filter(f => f.type.startsWith('image/'));
      selectedFiles.push(...allowed);
      if (allowed.length !== files.length) showMessage('Seules les images sont acceptées.', 'error');
      updatePreview();
      clearMessage();
    }

    uploadZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
      addFiles(e.target.files);
      e.target.value = '';
    });

    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      addFiles(e.dataTransfer.files);
    });

    btnClear.addEventListener('click', () => {
      selectedFiles = [];
      updatePreview();
      clearMessage();
      reportCard.classList.remove('visible');
    });

    btnAnalyze.addEventListener('click', async () => {
      if (selectedFiles.length === 0) return;
      clearMessage();
      btnAnalyze.disabled = true;
      btnAnalyze.innerHTML = '<span class="loader"></span> Analyse en cours…';

      const formData = new FormData();
      selectedFiles.forEach(f => formData.append('images', f));

      try {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          body: formData,
        });
        const data = await res.json().catch(() => ({}));

        if (data.success && data.rapport) {
          reportMeta.textContent = `Rapport généré le ${new Date().toLocaleString('fr-FR')}`;
          reportContent.textContent = data.rapport;
          reportCard.classList.add('visible');
          reportCard.scrollIntoView({ behavior: 'smooth' });
          window.lastReport = data.rapport;
          showMessage('Rapport généré avec succès.', 'success');
        } else {
          showMessage(data.error || 'Erreur lors de l’analyse.', 'error');
        }
      } catch (err) {
        showMessage('Erreur réseau : ' + err.message, 'error');
      } finally {
        btnAnalyze.disabled = false;
        btnAnalyze.textContent = 'Lancer l’analyse';
      }
    });

    btnExport.addEventListener('click', async () => {
      const rapport = window.lastReport;
      if (!rapport) {
        showMessage('Générez d’abord un rapport.', 'error');
        return;
      }
      try {
        const res = await fetch('/api/export-report', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ rapport }),
        });
        const data = await res.json();
        if (data.success && data.download_url) {
          window.open(data.download_url, '_blank');
          showMessage('Téléchargement du rapport lancé.', 'success');
        } else {
          showMessage(data.error || 'Erreur export.', 'error');
        }
      } catch (err) {
        showMessage('Erreur : ' + err.message, 'error');
      }
    });
  </script>
</body>
</html>
