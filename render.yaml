# Déploiement sur Render.com — déploiement automatique à chaque push
# Doc: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: analyse-morphologique
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      # Optionnel : pour IA locale (Ollama) ne pas définir OPENAI_API_KEY et mettre :
      # - key: OPENAI_BASE_URL
      #   value: https://votre-ollama.example.com/v1
      # - key: OPENAI_MODEL
      #   value: llava
